<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>AgentHarness DevUI</title>
		<style>
			* { box-sizing: border-box; }
			body { margin: 0; height: 100vh; display: flex; flex-direction: column; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #e6e6e6; background: #1e1e1e; }
			header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #252526; border-bottom: 1px solid #333; }
			header .status { width: 10px; height: 10px; border-radius: 50%; background: #888; }
			header .status.connected { background: #4caf50; }
			header .status.error { background: #f44336; }
			header button { margin-left: auto; background: #3a3d41; color: #e6e6e6; border: 1px solid #555; padding: 4px 12px; cursor: pointer; }
			main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; }
			#chat, #trace { overflow-y: auto; padding: 12px; }
			#trace { border-left: 1px solid #333; background: #1a1a1a; }
			.bubble { margin: 6px 0; padding: 8px 12px; border-radius: 6px; white-space: pre-wrap; }
			.bubble.user { background: #0e639c; }
			.bubble.assistant { background: #2d2d30; }
			.bubble.error { background: #5a1d1d; }
			.trace-item { font-size: 12px; padding: 4px 6px; border-bottom: 1px solid #2a2a2a; }
			.trace-item .type { color: #4fc1ff; }
			.trace-item.error .type { color: #f44336; }
			form { display: flex; gap: 8px; padding: 8px 16px; background: #252526; border-top: 1px solid #333; }
			#input { flex: 1; background: #1e1e1e; color: #e6e6e6; border: 1px solid #555; padding: 8px; }
			#send { background: #0e639c; color: #fff; border: none; padding: 8px 16px; cursor: pointer; }
		</style>
	</head>
	<body>
		<header>
			<span class="status" id="status"></span>
			<span id="model">connecting…</span>
			<button id="abort">Abort</button>
		</header>
		<main>
			<div id="chat"></div>
			<div id="trace"></div>
		</main>
		<form id="form">
			<input id="input" autocomplete="off" placeholder="Send a prompt…" />
			<button id="send" type="submit">Send</button>
		</form>
		<script src="/app.js" type="module"></script>
	</body>
</html>
